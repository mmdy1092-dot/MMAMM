version: "3.9"

services:
  api:
    build: .
    container_name: hormuz-oil-api
    ports:
      - "8000:8000"
    volumes:
      - ./model:/app/model    # hot-swap model without rebuild
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
